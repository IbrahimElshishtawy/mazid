name: m_shop
description: "Factory dashboard app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.10.1
  shared_preferences: ^2.5.3
  flutter_bloc: ^9.1.1
  font_awesome_flutter: ^10.10.0
  intl_phone_field: ^3.2.0
  dio: ^5.9.0
  equatable: ^2.0.7
  google_sign_in: ^7.2.0
  shelf: ^1.4.2
  liquid_swipe: ^3.1.0
  curved_navigation_bar: ^1.0.6
  lottie: ^3.3.2
  carousel_slider: ^5.1.1
  smooth_page_indicator: ^1.2.1
  provider: ^6.1.5+1
  redux: ^5.0.0
  flutter_redux: ^0.10.0
  cached_network_image: ^3.4.1
  flutter_launcher_icons: ^0.14.4
  rename: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/asset/icon/iconimage.jpg
    - assets/asset/image/
    - assets/asset/animation/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/asset/icon/iconimage.jpg"
